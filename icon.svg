<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8fa4b5" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#2c3e50" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2c3e50" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#f4f0e8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#8fa4b5" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#f4f0e8"/>
  <!-- Outer ripples -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#2c3e50" stroke-width="1.5" opacity="0.15"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#2c3e50" stroke-width="1.5" opacity="0.25"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#2c3e50" stroke-width="2" opacity="0.35"/>
  <!-- Glow -->
  <circle cx="256" cy="256" r="140" fill="url(#glow)"/>
  <!-- Core breath circle -->
  <circle cx="256" cy="256" r="72" fill="url(#core)"/>
  <circle cx="256" cy="256" r="72" fill="none" stroke="#2c3e50" stroke-width="2.5" opacity="0.5"/>
</svg>
